experiment:
    type: fastavatar
    seed: 42
    parent: fastavatar
    child: fastavatar

model:
    pretrained_model_path: "./model_zoo/fastavatar/model.safetensors"

    # image encoder
    encoder_path: "./model_zoo/DINO/dinov2.safetensors"
    source_image_res: 512
    encoder_grad_ckpt: true
    encoder_model_name: "dinov2_vitl14_reg"
    encoder_feat_dim: 1024
    encoder_freeze: true

    # points embeddings
    pcl_dim: 1024

    # transformer
    num_base_frames: 16
    if_framepack: true
    framepack_compression_level: 8  # [2, 4, 8]
    transformer_dim: 1024
    context_attn_layers: 8
    transformer_layers: 10
    transformer_heads: 16
    tf_grad_ckpt: true
    aa_order: ["global", "frame"]

    # for gs renderer
    renderer_freeze: false
    human_model_path: "./model_zoo/human_parametric_models"
    flame_subdivide_num: 1
    gs_query_dim: 1024
    gs_use_rgb: true
    gs_sh: 3
    gs_mlp_network_config:
        n_neurons: 512
        n_hidden_layers: 2
        activation: "silu"
    gs_xyz_offset_max_step: 0.2
    gs_clip_scaling: 0.01
    scale_sphere: false
    add_teeth: true
    fix_opacity: false
    fix_rotation: false
    teeth_bs_flag: false
    oral_mesh_flag: true
    gs_pruning: true
    rendering_chunk_size_train: 16
    rendering_chunk_size_infer: 128

dataset:
    input_frames: 256
    target_frames: 16
    render_image_res: 512
    source_image_res: 512
    num_train_workers: 2
    num_val_workers: 1
    pin_mem: true
    val_num: 128
    multiply: 2
    # Multiple datasets config
    meta_path: "./datasets/mixed_uids.json"
    datasets:
        nersemble:
            root_dir: YOUR_DATA_PATH
            task_type: "unified"
            val_id: [] # '309', '146', '123', '370', '204'
        vfhq:
            root_dir: YOUR_DATA_PATH
            task_type: "monocular"
            val_id: [] # '98tIutcmLfo', '2Bw4XUWgx6U', 'NoCALyAt1Os', 'LANE2TzVuLQ', 'JV5Z6eltAw'

train:
    gradient_checkpointing: true
    find_unused_parameters: true
    loss:
        pixel_loss_type: "l1"
        pixel_weight: 1.0
        perceptual_weight: 1.0
        ssim_weight: 0.1
        offset_weight: 0.1
        tracking_weight: 0.01
        pruning_weight: 0.0005
        identity_weight: 0.1
        arcface_checkpoint: "./model_zoo/arcface/arcface_checkpoint.tar"
    optim:
        lr: 1e-5
        heads_lr_scale: 5
        weight_decay: 0.001
        beta1: 0.9
        beta2: 0.95
        clip_grad_norm: 0
    scheduler:
        type: cosine
        warmup_real_iters: 0
    batch_size: 1
    accum_steps: 8
    epochs: 5
    debug_global_steps: null
    resume: ""

val:
    batch_size: 1
    global_step_period: 500
    debug_batches: null
    save_images: true
    save_dir: "./exps/val_perf"
    samples_per_save: 2

saver:
    auto_resume: true
    load_model: null
    checkpoint_root: "./exps/checkpoints"
    checkpoint_global_steps: 500
    checkpoint_keep_level: 3

logger:
    stream_level: INFO
    log_level: INFO
    log_root: "./exps/logs"
    tracker_root: "./exps/trackers"
    enable_profiler: false
    trackers:
        - tensorboard

compile:
    suppress_errors: true
    print_specializations: true
    disable: true